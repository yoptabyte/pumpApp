version: "3.8"

services:
  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-pampdb}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pampdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app_network

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  minio_init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY}; do sleep 2; done &&
      mc mb -p local/${S3_MEDIA_BUCKET:-media} || true &&
      mc anonymous set none local/${S3_MEDIA_BUCKET:-media}
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG:-0}
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - DB_NAME=${DB_NAME:-pampdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - BASE_API_URL=${BASE_API_URL}
      - BASE_APP_URL=${BASE_APP_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - GOOGLE_OAUTH2_KEY=${GOOGLE_OAUTH2_KEY}
      - GOOGLE_OAUTH2_SECRET=${GOOGLE_OAUTH2_SECRET}
      - SERVICE_NAME=web
      - COLLECTSTATIC=1
      - COOKIE_SECURE=${COOKIE_SECURE:-1}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-Lax}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-1}
      - USE_S3_MEDIA_STORAGE=${USE_S3_MEDIA_STORAGE:-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_MEDIA_BUCKET=${S3_MEDIA_BUCKET:-media}
      - S3_MEDIA_BASE_URL=${S3_MEDIA_BASE_URL}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - S3_SIGNATURE_VERSION=${S3_SIGNATURE_VERSION:-s3v4}
      - S3_QUERYSTRING_AUTH=${S3_QUERYSTRING_AUTH:-1}
      - EXTERNAL_MEDIA_ALLOWED_HOSTS=${EXTERNAL_MEDIA_ALLOWED_HOSTS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    networks:
      - app_network
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: /app/bot_entrypoint.sh
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_API_KEY=${BOT_API_KEY}
      - API_BASE_URL=http://web:8000
      - TIMEZONE=Europe/Lisbon
      - PYTHONPATH=/app
      - SERVICE_NAME=bot
      - HEADERS_HOST=web
      - BOT_LOG_LEVEL=${BOT_LOG_LEVEL:-WARNING}
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG:-0}
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME:-pampdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SERVICE_NAME=celery_worker
      - USE_S3_MEDIA_STORAGE=${USE_S3_MEDIA_STORAGE:-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_MEDIA_BUCKET=${S3_MEDIA_BUCKET:-media}
      - S3_MEDIA_BASE_URL=${S3_MEDIA_BASE_URL}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - S3_SIGNATURE_VERSION=${S3_SIGNATURE_VERSION:-s3v4}
      - S3_QUERYSTRING_AUTH=${S3_QUERYSTRING_AUTH:-1}
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    networks:
      - app_network
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG:-0}
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME:-pampdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SERVICE_NAME=celery_beat
      - USE_S3_MEDIA_STORAGE=${USE_S3_MEDIA_STORAGE:-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_MEDIA_BUCKET=${S3_MEDIA_BUCKET:-media}
      - S3_MEDIA_BASE_URL=${S3_MEDIA_BASE_URL}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - S3_SIGNATURE_VERSION=${S3_SIGNATURE_VERSION:-s3v4}
      - S3_QUERYSTRING_AUTH=${S3_QUERYSTRING_AUTH:-1}
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    networks:
      - app_network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    ports:
      - "8080:8080"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app_network:
    name: pamp_network
    driver: bridge

volumes:
  postgres_data:
    name: pamp_postgres_data
  static_volume:
    name: pamp_static_volume
  media_volume:
    name: pamp_media_volume
  redis_data:
    name: pamp_redis_data
  minio_data:
    name: pamp_minio_data
